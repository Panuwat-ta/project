<style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #F6F8FB;
            color: #121c26;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(216, 224, 234, 0.5);
            box-shadow: 0px 8px 24px rgba(23, 33, 43, 0.08);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-ring:focus-within {
            border-color: #006685;
            box-shadow: 0 0 0 3px rgba(0, 102, 133, 0.1);

<body class="flex items-center justify-center min-h-screen p-safe-margin bg-bg-light">
<!-- Atmospheric Background Decoration -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[50%] h-[50%] bg-surface-container-highest/30 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[50%] h-[50%] bg-primary-container/10 blur-[120px] rounded-full"></div>
</div>
<!-- Main Login Canvas -->
<main class="relative w-full max-w-[440px] z-10">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center mb-xl text-center">
<div class="w-20 h-20 mb-md bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-[48px]" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-xs">ScamGuard</h1>
<p class="font-body-base text-body-base text-text-secondary">ระบบรักษาความปลอดภัยอัจฉริยะ</p>
</div>
<!-- Login Form Card -->
<div class="glass-card rounded-xl p-xl mb-lg">
<h2 class="font-title-md text-title-md text-on-background mb-lg">เข้าสู่ระบบ</h2>
<form class="space-y-md" id="loginForm">
<!-- Email Input -->
<div class="space-y-sm">
<label class="font-button-label text-sm text-on-surface-variant block" for="email">อีเมล</label>
<div class="relative group input-focus-ring border border-border bg-white rounded-lg transition-all duration-200">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-md py-3 bg-transparent border-none focus:ring-0 font-body-base text-on-surface placeholder:text-outline/50" id="email" name="email" placeholder="example@email.com" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-button-label text-sm text-on-surface-variant block" for="password">รหัสผ่าน</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">ลืมรหัสผ่าน</a>
</div>
<div class="relative group input-focus-ring border border-border bg-white rounded-lg transition-all duration-200">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-12 py-3 bg-transparent border-none focus:ring-0 font-body-base text-on-surface placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibilityIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center pt-xs">
<input class="w-4 h-4 text-primary border-border rounded focus:ring-primary" id="remember" type="checkbox">
<label class="ml-2 font-body-base text-sm text-on-surface-variant" for="remember">จดจำการใช้งานของฉัน</label>
</div>
<!-- Primary CTA -->
<button class="w-full mt-lg py-4 bg-primary text-on-primary font-button-label text-button-label rounded-lg shadow-md shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all duration-200" type="submit">
                    เข้าสู่ระบบ
                </button><!-- Divider -->
<div class="relative flex items-center py-4">
    <div class="flex-grow border-t border-border"></div>
    <span class="flex-shrink mx-4 text-xs text-text-secondary font-body-base">หรือ</span>
    <div class="flex-grow border-t border-border"></div>
</div>

<!-- Social Login Buttons -->
<div class="space-y-sm">
    <button type="button" class="w-full flex items-center justify-center gap-2 py-3 border border-border bg-white rounded-lg font-button-label text-on-surface hover:bg-bg-light active:scale-[0.98] transition-all duration-200">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
            <path d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
        </svg>
        <span class="">เข้าสู่ระบบด้วย Google</span>
    </button>
    <button type="button" class="w-full flex items-center justify-center gap-2 py-3 border border-border bg-white rounded-lg font-button-label text-on-surface hover:bg-bg-light active:scale-[0.98] transition-all duration-200">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.78 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.81-3.12 1.87-2.38 5.98.48 7.13-.64 1.59-1.46 3.16-2.53 4.09zM12.03 7.25c-.02-2.23 1.76-4.07 3.9-4.25.22 2.48-2.32 4.75-3.9 4.25z"></path>
        </svg>
        <span class="">เข้าสู่ระบบด้วย Apple</span>
    </button>
</div>
</form>
</div>
<!-- Secondary Navigation -->
<div class="text-center">
<p class="font-body-base text-body-base text-text-secondary">
                ยังไม่มีบัญชีใช่หรือไม่? 
                <a class="font-semibold text-primary hover:underline ml-1" href="#">สมัครสมาชิก</a>
</p>
</div>
<!-- Footer Visual (Image Placeholder with prompt) -->
<div class="mt-xxl flex justify-center opacity-40">
<div class="w-32 h-16 bg-contain bg-center bg-no-repeat grayscale" data-alt="A clean and professional digital security illustration with abstract blue nodes and shield patterns. The style is modern corporate minimalist, using the brand colors of Trust Blue and soft gray. The composition is centered and symmetrical, suggesting stability and robust protection. High-key soft lighting creates a safe and reliable light-mode aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBpewg3UYkDbZhLMOStm8eQGs6MHMIrqOH1BXbTPZ_EnVPCOlTE_8SF6rzHvT1q0sIe69b2kmak1oPsqvCC-Njuu595A_sb7sgNWOmKjihfN3Qri__LjoniDSIBKNkwz4araAjrO7S0hm3SbYigqTb042WgS4TZOk3yYDjnmHeywcI6wIfxfcQZFP0IvVi33tdjIW8EvexdNQsD60qvPb3PluWKK-Tc__hOfn6FENtfKGRS87KOz6A0S_x4tuO64LxKxalTxpHy2kY')"></div>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibilityIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        }

        // Mock interaction for visual feedback
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="inline-block animate-spin mr-2"><span class="material-symbols-outlined">sync</span></span> กำลังเข้าสู่ระบบ...';
            btn.disabled = true;
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-80');
            }, 2000);
        });
    </script>


</body></html>
