<style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #0F1720;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .splash-gradient {
            background: linear-gradient(135deg, #0F1720 0%, #162230 100%);
        }

        .loading-ring {
            display: inline-block;
            width: 48px;
            height: 48px;
        }
        .loading-ring:after {
            content: " ";
            display: block;
            width: 32px;
            height: 32px;
            margin: 8px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            border-color: #ffffff transparent #ffffff transparent;
            animation: loading-ring 1.2s linear infinite;
        }
        @keyframes loading-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .animate-logo {
            animation: pulse-shield 3s ease-in-out infinite;
        }

        @keyframes pulse-shield {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
</head>
<body class="flex items-center justify-center splash-gradient text-white">
<!-- Subtle Background Atmosphere -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/30 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-secondary/20 blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative flex flex-col items-center justify-between h-full w-full max-w-[540px] py-xxl px-safe-margin z-10">
<!-- Top Spacer for centering logo -->
<div class="h-16"></div>
<!-- Center Brand Identity -->
<div class="flex flex-col items-center gap-lg">
<!-- Logo Container -->
<div class="relative flex items-center justify-center animate-logo">
<!-- Outer Glow -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-xl scale-125"></div>
<!-- Shield Icon -->
<div class="relative w-32 h-32 glass-effect rounded-[32px] flex items-center justify-center shadow-2xl">
<span class="material-symbols-outlined text-[80px] text-white" style="font-variation-settings: 'FILL' 1;">
                        shield
                    </span>
<!-- Magnifying Glass Overlay -->
<div class="absolute flex items-center justify-center bg-surface-dark rounded-full p-xs shadow-lg bottom-2 right-2 border border-white/10">
<span class="material-symbols-outlined text-primary-fixed text-[32px]" style="font-variation-settings: 'wght' 700;">
                            search
                        </span>
</div>
</div>
</div>
<!-- App Name Texts -->
<div class="text-center space-y-sm mt-md">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile tracking-tight">
                    Scam Image Detection
                </h1>
<p class="font-title-md text-title-md font-medium opacity-90">
                    ตรวจจับรูปภาพหลอกลวง
                </p>
<div class="flex items-center justify-center gap-xs mt-sm">
<span class="material-symbols-outlined text-secondary-fixed text-sm">verified_user</span>
<span class="font-caption text-caption text-secondary-fixed tracking-wider uppercase">Secure &amp; Reliable</span>
</div>
</div>
</div>
<!-- Bottom Loading Section -->
<div class="flex flex-col items-center gap-md mb-xl">
<!-- Circular Loading Indicator -->
<div class="loading-ring"></div>
<!-- Status Text -->
<div class="flex flex-col items-center gap-xs">
<p class="font-body-base text-body-base opacity-80 transition-opacity duration-500" id="loading-status" style="opacity: 0.8;">ตรวจสอบความปลอดภัย...</p>
<p class="font-caption text-caption opacity-50">
                    ScamGuard v1.0.0
                </p>
</div>
</div>
</main>
<!-- Background Pattern Decoration (Subtle Security Grid) -->
<div class="absolute inset-0 z-0 opacity-[0.03]" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 40px 40px;">
</div>
<script>
        // Micro-interaction: Changing loading status text
        const statuses = [
            "กำลังเริ่มต้นระบบ...",
            "ตรวจสอบความปลอดภัย...",
            "โหลดฐานข้อมูลล่าสุด...",
            "เตรียมความพร้อม..."
        ];
        let currentStatus = 0;
        const statusElement = document.getElementById('loading-status');

        setInterval(() => {
            statusElement.style.opacity = '0';
            setTimeout(() => {
                currentStatus = (currentStatus + 1) % statuses.length;
                statusElement.textContent = statuses[currentStatus];
                statusElement.style.opacity = '0.8';
            }, 500);
        }, 2000);

        // Simulation of app transition (visual only)
        document.body.addEventListener('click', () => {
            document.body.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
            document.body.style.transform = 'scale(1.1)';
            document.body.style.opacity = '0';
        });
    </script>
