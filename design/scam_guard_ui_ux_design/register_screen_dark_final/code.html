<!DOCTYPE html><html lang="th"><head>

        }
        /* Custom micro-interactions */
        .input-focus-ring:focus-within {
            ring: 2px;
            ring-color: #6cd2ff;
            border-color: transparent;
        }
    </style>

                        "on-tertiary-fixed-variant": "#653e00",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#edf4ff",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#3d484e",
                        "text-secondary": "#5E6B78",
                        "on-primary": "#ffffff",
                        "primary": "#006685",
                        "surface-container": "#e4effd",
                        "surface": "#f7f9ff",
                        "on-primary-container": "#003649",
                        "surface-dim": "#d1dbe9",
                        "primary-fixed": "#bfe9ff",
                        "secondary-fixed": "#7ffc97",
                        "on-secondary-fixed-variant": "#005320",
                        "secondary-fixed-dim": "#62df7d",
                        "on-surface": "#121c26",
                        "surface-tint": "#006685",
                        "inverse-on-surface": "#e8f2ff",
                        "danger": "#DC2626",
                        "on-secondary-fixed": "#002109",
                        "secondary": "#006e2d",
                        "on-tertiary-fixed": "#2a1700",
                        "surface-container-highest": "#d9e3f1",
                        "outline-variant": "#bdc8cf",

                        "bg-dark": "#0F1720",

                        "surface-dark": "#162230",

                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {

                        "safe-margin": "20px",

                    },

                        "section-header": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],

                },
            },

<body class="bg-bg-dark min-h-screen flex flex-col items-center justify-center">
<!-- Top AppBar -->
<header class="fixed top-0 left-0 w-full bg-surface-dark border-b border-inverse-surface h-16 flex items-center px-safe-margin z-50">
<button class="p-2 -ml-2 text-surface-variant hover:bg-inverse-surface rounded-full transition-colors active:scale-95 duration-150" onclick="window.history.back()">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="ml-2 flex items-center gap-2">
<span class="material-symbols-outlined text-inverse-primary" data-icon="shield_lock" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-inverse-primary">ScamGuard</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[540px] px-safe-margin pt-24 flex-grow flex flex-col justify-center pb-24">
<!-- Registration Card -->
<div class="bg-surface-dark p-xl rounded-xl border border-inverse-surface shadow-none">
<div class="mb-lg text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-surface-light mb-xs">สมัครสมาชิกใหม่</h2>
<p class="font-body-base text-body-base text-outline-variant">เข้าร่วมระบบรักษาความปลอดภัยอัจฉริยะ</p>
</div>
<form class="space-y-md">
<!-- Name Field -->
<div class="space-y-xs">
<label class="font-button-label text-caption text-surface-variant ml-1" for="name">ชื่อ-นามสกุล</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-outline-variant group-focus-within:text-inverse-primary transition-colors" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-inverse-surface border border-outline rounded-lg font-body-base text-surface-light placeholder-outline focus:ring-2 focus:ring-inverse-primary focus:border-transparent transition-all outline-none" id="name" placeholder="กรอกชื่อและนามสกุลของคุณ" type="text">
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-button-label text-caption text-surface-variant ml-1" for="email">อีเมล</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-outline-variant group-focus-within:text-inverse-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-inverse-surface border border-outline rounded-lg font-body-base text-surface-light placeholder-outline focus:ring-2 focus:ring-inverse-primary focus:border-transparent transition-all outline-none" id="email" placeholder="example@email.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-button-label text-caption text-surface-variant ml-1" for="password">รหัสผ่าน</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-outline-variant group-focus-within:text-inverse-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-inverse-surface border border-outline rounded-lg font-body-base text-surface-light placeholder-outline focus:ring-2 focus:ring-inverse-primary focus:border-transparent transition-all outline-none" id="password" placeholder="อย่างน้อย 8 ตัวอักษร" type="password">
<button class="absolute right-4 text-outline-variant hover:text-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-xs">
<label class="font-button-label text-caption text-surface-variant ml-1" for="confirm_password">ยืนยันรหัสผ่านอีกครั้ง</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-outline-variant group-focus-within:text-inverse-primary transition-colors" data-icon="lock_reset">lock_reset</span>
<input class="w-full pl-12 pr-12 py-3 bg-inverse-surface border border-outline rounded-lg font-body-base text-surface-light placeholder-outline focus:ring-2 focus:ring-inverse-primary focus:border-transparent transition-all outline-none" id="confirm_password" placeholder="กรอกรหัสผ่านเดิมอีกครั้ง" type="password">
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 py-2">
<div class="relative flex items-center pt-0.5">
<input class="w-5 h-5 rounded border-outline text-inverse-primary focus:ring-inverse-primary focus:ring-offset-0 bg-inverse-surface transition-all cursor-pointer" id="terms" type="checkbox">
</div>
<label class="font-body-base text-caption text-outline-variant leading-tight cursor-pointer" for="terms">
                        ฉันยอมรับ <a class="text-inverse-primary font-semibold hover:underline" href="#">เงื่อนไขการใช้งาน</a> และ <a class="text-inverse-primary font-semibold hover:underline" href="#">นโยบายความเป็นส่วนตัว</a> ของระบบ ScamGuard
                    </label>
</div>
<!-- Primary CTA -->
<button class="w-full bg-inverse-primary text-on-primary-fixed py-4 rounded-lg font-button-label text-button-label shadow-md hover:bg-primary-fixed transition-all active:scale-[0.98] duration-150 flex items-center justify-center gap-2 mt-4" type="submit">
<span class="">สมัครสมาชิก</span>
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
</button>
</form>
<div class="mt-xl flex flex-col items-center gap-md">
<div class="flex items-center w-full gap-2">
<div class="h-px bg-inverse-surface flex-grow"></div>
<span class="text-caption text-outline-variant font-body-base">หรือ</span>
<div class="h-px bg-inverse-surface flex-grow"></div>
</div>
<p class="font-body-base text-body-base text-surface-variant">
                    มีบัญชีอยู่แล้ว? 
                    <a class="text-inverse-primary font-bold ml-1 hover:underline active:opacity-70" href="#" onclick="window.history.back()">เข้าสู่ระบบ</a>
</p>
</div>
</div>
<!-- Atmospheric Background Image -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-30">
<div class="absolute inset-0 bg-gradient-to-tr from-bg-dark via-transparent to-surface-dark"></div>
<div class="absolute bottom-0 right-0 w-[600px] h-[600px] blur-[120px] bg-inverse-primary/10 rounded-full"></div>
<div class="absolute top-0 left-0 w-[400px] h-[400px] blur-[100px] bg-secondary-fixed/5 rounded-full"></div>
</div>
</main><nav class="fixed bottom-0 left-0 w-full bg-surface-dark border-t border-inverse-surface h-16 flex items-center justify-around px-safe-margin z-50">
    <a href="#" class="flex flex-col items-center gap-1 text-inverse-primary">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
        <span class="text-[10px] font-semibold">หน้าหลัก</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-1 text-surface-variant hover:text-inverse-primary transition-colors">
        <span class="material-symbols-outlined">history</span>
        <span class="text-[10px] font-semibold">ประวัติ</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-1 text-surface-variant hover:text-inverse-primary transition-colors">
        <span class="material-symbols-outlined">flag</span>
        <span class="text-[10px] font-semibold">แจ้งรายงาน</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-1 text-surface-variant hover:text-inverse-primary transition-colors">
        <span class="material-symbols-outlined">settings</span>
        <span class="text-[10px] font-semibold">ตั้งค่า</span>
    </a>
</nav>
<!-- Footer Security Badge -->
<footer class="w-full max-w-[540px] px-safe-margin pb-xl text-center mb-16">
<div class="inline-flex items-center gap-2 px-3 py-1 bg-inverse-surface rounded-full border border-outline/30">
<span class="material-symbols-outlined text-[16px] text-secondary-fixed" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[12px] font-semibold text-secondary-fixed uppercase tracking-wider">End-to-End Encrypted Data Protection</span>
</div>
</footer>
<script>
        // Micro-interactions for form field icons
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                const icon = input.previousElementSibling;
                if (icon && icon.classList.contains('material-symbols-outlined')) {
                    icon.style.fontVariationSettings = "'FILL' 1";
                }
            });
            input.addEventListener('blur', () => {
                const icon = input.previousElementSibling;
                if (icon && icon.classList.contains('material-symbols-outlined')) {
                    icon.style.fontVariationSettings = "'FILL' 0";
                }
            });
        });

        // Simple Toggle for Password visibility
        const toggleButtons = document.querySelectorAll('button[type="button"]');
        toggleButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const input = btn.previousElementSibling;
                const icon = btn.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.innerText = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.innerText = 'visibility';
                }
            });
        });
    </script>


</body></html>
