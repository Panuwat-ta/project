name: scam_image_mobile
description: "ScamGuard Mobile App - Scam Image Detection"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^17.3.0

  # Network
  dio: ^5.8.0+1

  # Storage
  flutter_secure_storage: ^10.3.1

  # Image
  image_picker: ^1.1.2
  image_cropper: ^12.2.1
  cached_network_image: ^3.4.1

  # Fonts
  google_fonts: ^8.1.0

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

  # Share
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
